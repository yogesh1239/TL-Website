name: Update Production Alias

on:
  push:
    branches: [main]

jobs:
  alias:
    name: Point lorepress.vercel.app to latest deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment and update alias
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, time, sys

          token = os.environ["VERCEL_TOKEN"]
          project_id = "prj_lXFu6k2ZEZjDa1BBLrMusWHe7CbJ"
          team_id = "team_85Ammg5shxrIK2eJHfMO0t9G"
          alias = "lorepress.vercel.app"

          def api(path, method="GET", body=None):
              req = urllib.request.Request(
                  f"https://api.vercel.com{path}",
                  data=json.dumps(body).encode() if body else None,
                  headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
                  method=method,
              )
              return json.loads(urllib.request.urlopen(req, timeout=30).read())

          print("Waiting for production deployment to be READY...")
          dep = None
          for attempt in range(36):  # up to 6 minutes
              data = api(f"/v6/deployments?projectId={project_id}&teamId={team_id}&limit=1&target=production")
              deps = data.get("deployments", [])
              if deps:
                  dep = deps[0]
                  state = dep.get("readyState") or dep.get("state", "UNKNOWN")
                  print(f"  [{attempt*10}s] {dep['id']} — {state}")
                  if state == "READY":
                      break
                  if state in ("ERROR", "CANCELED"):
                      print(f"Deployment failed with state: {state}")
                      sys.exit(1)
              time.sleep(10)
          else:
              print("Timed out waiting for deployment")
              sys.exit(1)

          print(f"Setting alias {alias} → {dep['url']}")
          result = api(
              f"/v2/deployments/{dep['id']}/aliases?teamId={team_id}",
              method="POST",
              body={"alias": alias},
          )
          print(f"Done: {result.get('alias', result)}")
          EOF
