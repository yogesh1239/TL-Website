name: Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Codex Review
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.ts' '*.tsx' '*.js' '*.mjs' '*.css' '*.md' \
            | head -c 14000 > pr.diff
          echo "Diff size: $(wc -c < pr.diff) bytes"

      - name: Run Codex review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, sys

          diff = open("pr.diff").read().strip()
          if not diff:
              open("review.md", "w").write("_No reviewable changes in this PR._")
              sys.exit(0)

          payload = {
              "model": "gpt-4o",
              "max_tokens": 1800,
              "messages": [
                  {
                      "role": "system",
                      "content": (
                          "You are a senior code reviewer for a Next.js 14 static-export webnovel reading platform "
                          "(Tailwind CSS, gray-matter, localStorage for reading progress, 'use client' components). "
                          "Review the diff strictly. Report only real problems — skip anything that is fine. "
                          "Categories: **Critical** (broken functionality, data loss, security), "
                          "**Important** (wrong client/server boundary, missing localStorage guard, type errors, mobile layout bugs), "
                          "**Minor** (style, readability). "
                          "For each issue: file:line, what's wrong, why it matters, how to fix. "
                          "End with one-line verdict: LGTM | Needs fixes."
                      )
                  },
                  {
                      "role": "user",
                      "content": f"Review this PR diff:\n\n```diff\n{diff}\n```"
                  }
              ]
          }

          req = urllib.request.Request(
              "https://api.openai.com/v1/chat/completions",
              data=json.dumps(payload).encode(),
              headers={
                  "Authorization": f"Bearer {os.environ['OPENAI_API_KEY']}",
                  "Content-Type": "application/json",
              },
          )
          resp = urllib.request.urlopen(req, timeout=60)
          result = json.loads(resp.read())
          review = result["choices"][0]["message"]["content"]
          open("review.md", "w").write(review)
          print(f"Review generated ({len(review)} chars)")
          EOF

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const review = fs.readFileSync('review.md', 'utf8')
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Codex Review\n\n${review}\n\n---\n*Automated review by OpenAI gpt-4o · [View run](${runUrl})*`
            })
